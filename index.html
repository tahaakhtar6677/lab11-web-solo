<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 11 - Solo Deployment</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #080808;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Background lines */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 50% 100%, rgba(201,168,76,0.1) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 10%, rgba(201,168,76,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .line {
            position: fixed;
            top: 0; bottom: 0;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.2), transparent);
        }
        .line:nth-child(1) { left: 15%; }
        .line:nth-child(2) { left: 50%; }
        .line:nth-child(3) { right: 15%; }

        .container {
            background: #111;
            border: 1px solid rgba(201,168,76,0.25);
            padding: 3rem 3.5rem;
            max-width: 460px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeUp 1s ease forwards;
        }

        /* Gold top bar */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 40px;
            width: 80px; height: 2px;
            background: #C9A84C;
        }

        .eyebrow {
            font-size: 10px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #C9A84C;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .eyebrow::before, .eyebrow::after {
            content: '';
            display: block;
            width: 30px; height: 1px;
            background: rgba(201,168,76,0.4);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 300;
            color: #F5EED8;
            line-height: 1.1;
            margin-bottom: 8px;
        }
        h1 em {
            font-style: italic;
            color: #C9A84C;
        }

        p {
            font-size: 13px;
            font-weight: 300;
            color: #888880;
            line-height: 1.9;
            margin-top: 20px;
            letter-spacing: 0.03em;
        }
        p strong {
            color: #C9A84C;
            font-weight: 400;
        }

        .badge {
            background: transparent;
            border: 1px solid rgba(201,168,76,0.4);
            color: #C9A84C;
            padding: 10px 28px;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
        }
        .badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #C9A84C;
            animation: pulse 2s infinite;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.7); }
        }
    </style>
</head>
<body>

    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>

    <div class="container">
        <div class="eyebrow">Lab 11</div>
        <h1>Deployment<br/><em>Successful!</em></h1>
        <p>This website was deployed solo using <strong>GitHub Pages</strong> and <strong>Git Actions</strong>.</p>
        <div class="badge">Status: Live &amp; Online</div>
    </div>

</body>
</html>
